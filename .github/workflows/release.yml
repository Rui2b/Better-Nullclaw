name: Build and Release NullClaw

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-linux
            os: ubuntu-latest
            suffix: ""
          - target: x86_64-windows
            os: windows-latest
            suffix: ".exe"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Zig 0.15.2
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            # 使用官方直接下载链接，确保带上参数处理重定向
            curl -L "https://ziglang.org/download/0.15.2/zig-windows-x86_64-0.15.2.zip" -o zig.zip
            unzip -q zig.zip
            echo "$(pwd)/zig-windows-x86_64-0.15.2" >> $GITHUB_PATH
          else
            # Linux 环境下载 .tar.xz
            curl -L "https://ziglang.org/download/0.15.2/zig-linux-x86_64-0.15.2.tar.xz" -o zig.tar.xz
            tar -xf zig.tar.xz
            echo "$(pwd)/zig-linux-x86_64-0.15.2" >> $GITHUB_PATH
          fi

      - name: Build NullClaw
        # 严格执行官方 ReleaseSmall 构建命令
        run: zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseSmall

      - name: Auto-collect Binaries
        shell: bash
        run: |
          mkdir -p output
          BIN_NAME=$(ls zig-out/bin/ | head -n 1)
          if [ -z "$BIN_NAME" ]; then
            echo "Error: No binary found in zig-out/bin/"
            exit 1
          fi
          cp "zig-out/bin/$BIN_NAME" "output/${BIN_NAME}-${{ matrix.target }}${{ matrix.suffix }}"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nullclaw-build-${{ matrix.target }}
          path: output/*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: all-artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
