name: Build and Release NullClaw

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-windows
            os: windows-latest
            suffix: ".exe"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Zig 0.15.2
        uses: mlugg/setup-zig@v1
        with:
          version: 0.15.2

      - name: Build NullClaw
        shell: pwsh
        run: |
          # setup-zig 会自动将 zig 加入 PATH，直接调用即可
          zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseSmall

      - name: Auto-collect Binaries
        shell: bash
        run: |
          mkdir -p output
          # 搜索编译生成的二进制文件
          BIN_NAME=$(ls zig-out/bin/ | head -n 1)
          if [ -z "$BIN_NAME" ]; then
            echo "Error: No binary found in zig-out/bin/"
            exit 1
          fi
          cp "zig-out/bin/$BIN_NAME" "output/${BIN_NAME}-${{ matrix.target }}${{ matrix.suffix }}"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nullclaw-build-${{ matrix.target }}
          path: output/*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: all-artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}