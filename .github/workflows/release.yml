name: Build and Release NullClaw

on:
  push:
    tags:
      - 'v*' # 当推送到 v1.0.0 等标签时触发

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-linux
            os: ubuntu-latest
            suffix: ""
          - target: x86_64-windows
            os: windows-latest
            suffix: ".exe"
          - target: x86_64-macos
            os: macos-latest
            suffix: ""
          - target: aarch64-macos
            os: macos-latest
            suffix: "-arm64"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.15.2 # 请根据你的 nullclaw 要求的 Zig 版本修改

      - name: Build NullClaw
        run: zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseFast

      - name: Rename binary
        shell: bash
        run: |
          mkdir -p output
          cp zig-out/bin/nullclaw${{ matrix.suffix }} output/nullclaw-${{ matrix.target }}${{ matrix.suffix }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nullclaw-${{ matrix.target }}
          path: output/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: all-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}