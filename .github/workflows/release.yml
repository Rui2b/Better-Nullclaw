name: Build and Release NullClaw

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-windows
            os: windows-latest
            suffix: ".exe"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Zig 0.15.2
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://ziglang.org/download/0.15.2/zig-x86_64-windows-0.15.2.zip" -OutFile "zig.zip"
          Expand-Archive -Path "zig.zip" -DestinationPath "$HOME\zig_tmp" -Force
          
          # 在整个临时目录搜索 zig.exe
          $zigPath = (Get-ChildItem -Path "$HOME\zig_tmp" -Filter "zig.exe" -Recurse | Select-Object -First 1).FullName
          if (-not $zigPath) { throw "找不到 zig.exe" }
          
          echo "ZIG_EXE=$zigPath" >> $env:GITHUB_ENV
          Write-Host "Zig 路径已锁定: $zigPath"

      - name: Build NullClaw
        shell: pwsh
        working-directory: ${{ github.workspace }}
        run: |
          # 确保在 build.zig 所在的目录下运行
          & "$env:ZIG_EXE" build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseSmall

      - name: Auto-collect Binaries
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          mkdir -p output
          BIN_NAME=$(ls zig-out/bin/ | head -n 1)
          if [ -z "$BIN_NAME" ]; then
            echo "Error: No binary found in zig-out/bin/"
            exit 1
          fi
          cp "zig-out/bin/$BIN_NAME" "output/${BIN_NAME}-${{ matrix.target }}${{ matrix.suffix }}"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nullclaw-build-${{ matrix.target }}
          path: output/*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: all-artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
