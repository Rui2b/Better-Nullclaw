name: Build and Release NullClaw

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-windows
            os: windows-latest
            suffix: ".exe"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Zig and Find Paths
        shell: pwsh
        run: |
          # 1. 使用你提供的官方链接下载
          Invoke-WebRequest -Uri "https://ziglang.org/download/0.15.2/zig-x86_64-windows-0.15.2.zip" -OutFile "zig.zip"
          Expand-Archive -Path "zig.zip" -DestinationPath "$HOME\zig_dist" -Force
          
          # 2. 全盘搜索 zig.exe 确定绝对路径
          Write-Host "正在扫描虚拟机以锁定 zig.exe..."
          $zigPath = (Get-ChildItem -Path C:\, D:\ -Filter "zig.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1).FullName
          if (-not $zigPath) { throw "虚拟机内未找到 zig.exe" }
          echo "ZIG_EXE=$zigPath" >> $env:GITHUB_ENV
          Write-Host "已锁定 Zig 路径: $zigPath"
          
          # 3. 全盘搜索 build.zig 确定源码根目录
          Write-Host "正在扫描虚拟机以锁定 build.zig..."
          $buildFile = (Get-ChildItem -Path C:\, D:\ -Filter "build.zig" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1).FullName
          if (-not $buildFile) { throw "虚拟机内未找到 build.zig，请确认源码已成功 Checkout" }
          $sourceRoot = Split-Path -Parent $buildFile
          echo "SOURCE_ROOT=$sourceRoot" >> $env:GITHUB_ENV
          Write-Host "已锁定源码目录: $sourceRoot"

      - name: Build NullClaw
        shell: pwsh
        run: |
          # 进入 build.zig 所在的目录
          cd "$env:SOURCE_ROOT"
          # 使用绝对路径运行编译
          & "$env:ZIG_EXE" build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseSmall

      - name: Auto-collect Binaries
        shell: bash
        run: |
          # 同样进入源码目录收集产物
          cd "$SOURCE_ROOT"
          mkdir -p output
          BIN_NAME=$(ls zig-out/bin/ | head -n 1)
          if [ -z "$BIN_NAME" ]; then
            echo "Error: No binary found in zig-out/bin/"
            exit 1
          fi
          cp "zig-out/bin/$BIN_NAME" "output/${BIN_NAME}-${{ matrix.target }}${{ matrix.suffix }}"
          # 移回工作区根目录以便上传
          mv output $GITHUB_WORKSPACE/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nullclaw-build-${{ matrix.target }}
          path: output/*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: all-artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}