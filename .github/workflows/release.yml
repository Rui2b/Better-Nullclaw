name: Build and Release NullClaw

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-windows
            os: windows-latest
            suffix: ".exe"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Zig 0.15.2
        shell: pwsh
        run: |
          # 1. 使用你提供的确切链接下载
          $url = "https://ziglang.org/download/0.15.2/zig-x86_64-windows-0.15.2.zip"
          Write-Host "正在从 $url 下载 Zig..."
          Invoke-WebRequest -Uri $url -OutFile "zig.zip"
          
          # 2. 解压到 C 盘根目录下的临时文件夹，路径更短更稳
          $dest = "C:\zig_dist"
          if (Test-Path $dest) { Remove-Item -Recurse -Force $dest }
          Expand-Archive -Path "zig.zip" -DestinationPath $dest -Force
          
          # 3. 暴力全盘搜索 zig.exe 确定路径
          Write-Host "正在全盘扫描 zig.exe 以确定位置..."
          $zigPath = (Get-ChildItem -Path C:\, D:\ -Filter "zig.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1).FullName
          if (-not $zigPath) { throw "虚拟机全盘扫描未找到 zig.exe" }
          
          # 4. 锁定路径并存入环境变量
          echo "ZIG_EXE=$zigPath" >> $env:GITHUB_ENV
          Write-Host "已锁定 Zig 路径: $zigPath"

      - name: Build NullClaw
        shell: pwsh
        run: |
          # 确定 build.zig 所在的位置（防止在错误目录下运行）
          $buildFile = (Get-ChildItem -Path ${{ github.workspace }} -Filter "build.zig" -Recurse | Select-Object -First 1).FullName
          $sourceRoot = Split-Path -Parent $buildFile
          cd "$sourceRoot"
          
          # 使用绝对路径执行编译
          & "$env:ZIG_EXE" build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseSmall

      - name: Auto-collect Binaries
        shell: bash
        run: |
          # 找到二进制产物
          BIN_PATH=$(find . -name "*.exe" | grep "zig-out/bin/" | head -n 1)
          if [ -z "$BIN_PATH" ]; then
            echo "Error: No binary found"
            exit 1
          fi
          mkdir -p output
          cp "$BIN_PATH" "output/NullClaw-${{ matrix.target }}${{ matrix.suffix }}"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nullclaw-build-${{ matrix.target }}
          path: output/*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: all-artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}